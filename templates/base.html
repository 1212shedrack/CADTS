<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="{% block meta_description %}CADTS — Centralized Ambulance Dispatch & Tracking System{% endblock %}"/>
  <title>{% block title %}CADTS{% endblock %} | Ambulance Dispatch System</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>

  <!-- Material Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>

  <!-- Main CSS -->
  <link rel="stylesheet" href="{% static 'css/main.css' %}"/>

  <!-- PWA Manifest -->
  <link rel="manifest" href="{% static 'manifest.json' %}"/>
  <meta name="theme-color" content="#e63946"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Ambulance"/>
  <link rel="apple-touch-icon" href="{% static 'icons/icon-192.png' %}"/>

  {% block extra_css %}{% endblock %}
</head>
<body>

<button type="button" class="global-mobile-menu-btn" id="global-mobile-menu-btn" aria-label="Open navigation menu">
  <span class="material-icons-round">menu</span>
</button>

{% block body %}{% endblock %}

{% block extra_js %}{% endblock %}

<!-- PWA Service Worker Registration -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register("{% static 'service-worker.js' %}")
        .then(reg => console.log('Service Worker registered:', reg.scope))
        .catch(err => console.log('Service Worker error:', err));
    });
  }
</script>

<script>
  (function () {
    const menuButton = document.getElementById('global-mobile-menu-btn');
    const sidebar = document.querySelector('.sidebar');
    if (!menuButton || !sidebar) {
      if (menuButton) menuButton.style.display = 'none';
      return;
    }

    let overlay = document.querySelector('.sidebar-overlay');
    if (!overlay) {
      overlay = document.createElement('div');
      overlay.className = 'sidebar-overlay';
      document.body.appendChild(overlay);
    }

    const menuIcon = menuButton.querySelector('.material-icons-round');

    function openSidebar() {
      sidebar.classList.add('open');
      overlay.classList.add('show');
      menuButton.classList.add('is-open');
      menuButton.setAttribute('aria-label', 'Close navigation menu');
      if (menuIcon) menuIcon.textContent = 'close';
      document.body.style.overflow = 'hidden';
    }

    function closeSidebar() {
      sidebar.classList.remove('open');
      overlay.classList.remove('show');
      menuButton.classList.remove('is-open');
      menuButton.setAttribute('aria-label', 'Open navigation menu');
      if (menuIcon) menuIcon.textContent = 'menu';
      document.body.style.overflow = '';
    }

    window.toggleSidebar = function () {
      if (sidebar.classList.contains('open')) closeSidebar();
      else openSidebar();
    };
    window.closeSidebar = closeSidebar;

    menuButton.addEventListener('click', window.toggleSidebar);
    overlay.addEventListener('click', closeSidebar);
  }());
</script>

</body>
</html>
