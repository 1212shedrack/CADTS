services:
  - type: web
    name: cadts-app
    plan: free
    env: python
    buildCommand: "./build.sh"
    startCommand: "daphne -b 0.0.0.0 -p $PORT ambulance_system.asgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.11
      - key: DATABASE_URL
        fromDatabase:
          name: cadts-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
        
databases:
  - name: cadts-db
    plan: free
    databaseName: cadts
    user: cadts_user
